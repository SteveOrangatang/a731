<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A731 Leadership Simulator — Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ── Inline SVG icons (no npm needed) ────────────────────────────────────
    const Ic = ({ d, d2, d3, circle, rect, className = "h-4 w-4" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        className={className}>
        {d  && <path d={d}  />}
        {d2 && <path d={d2} />}
        {d3 && <path d={d3} />}
        {circle && <circle cx={circle[0]} cy={circle[1]} r={circle[2]} />}
        {rect   && <rect x={rect[0]} y={rect[1]} width={rect[2]} height={rect[3]} rx={rect[4]||0} />}
      </svg>
    );

    const Shield        = ({className}) => <Ic className={className} d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />;
    const LogOut        = ({className}) => <Ic className={className} d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" d2="M16 17l5-5-5-5" d3="M21 12H9" />;
    const Users         = ({className}) => <Ic className={className} d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" d2="M23 21v-2a4 4 0 0 0-3-3.87" d3="M16 3.13a4 4 0 0 1 0 7.75" circle={[9,7,4]} />;
    const Send          = ({className}) => <Ic className={className} d="M22 2L11 13" d2="M22 2l-7 20-4-9-9-4 20-7" />;
    const Download      = ({className}) => <Ic className={className} d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" d2="M7 10l5 5 5-5" d3="M12 15V3" />;
    const Settings      = ({className}) => <Ic className={className} d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16z" d2="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" />;
    const ShieldAlert   = ({className}) => <Ic className={className} d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" d2="M12 8v4" d3="M12 16h.01" />;
    const ChevronRight  = ({className}) => <Ic className={className} d="M9 18l6-6-6-6" />;
    const Edit2         = ({className}) => <Ic className={className} d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />;
    const Trash2        = ({className}) => <Ic className={className} d="M3 6h18" d2="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />;
    const Plus          = ({className}) => <Ic className={className} d="M12 5v14M5 12h14" />;
    const Key           = ({className}) => <Ic className={className} d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />;
    const UserPlus      = ({className}) => <Ic className={className} d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" d2="M19 8v6" d3="M22 11h-6" circle={[9,7,4]} />;
    const Lock          = ({className}) => <Ic className={className} d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z" d2="M7 11V7a5 5 0 0 1 10 0v4" />;
    const AlertTriangle = ({className}) => <Ic className={className} d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" d2="M12 9v4" d3="M12 17h.01" />;
    const ToggleLeft    = ({className}) => <Ic className={className} rect={[1,5,22,14,7]} circle={[8,12,3]} />;
    const ToggleRight   = ({className}) => <Ic className={className} rect={[1,5,22,14,7]} circle={[16,12,3]} />;
    const X             = ({className}) => <Ic className={className} d="M18 6L6 18M6 6l12 12" />;

    // ── Constants ────────────────────────────────────────────────────────────
    const SUPER_ADMIN = 'CPTAMERICA';
    const LS = {
      agents:      'a731_agents',
      transcripts: 'a731_transcripts',
      passcodes:   'a731_passcodes',
      apiKey:      'a731_gemini_key',
      model:       'a731_gemini_model',
    };

    const lsGet = (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } };
    const lsSet = (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

    // ── Seed agents ──────────────────────────────────────────────────────────
    // initiates + openingMessage live on the persona — no separate scenarios.
    // type label is for instructors only (hidden from students in roster).
    const seedAgents = [
      {
        id:'weeds', rank:'LTC', name:'N. T. Weeds',
        type:'The Micromanager', active:true,
        initiates:true, isMoralCourageChallenge:true,
        openingMessage:"I need those Q4 readiness numbers on my desk before the CG brief at 1400. We're sitting at 71% — threshold is 75%. Count those three deadline vehicles as 'deadline-pending-parts' and move them to the FMC column. Nobody checks the paperwork before the brief. And fix the footer on the cover page while you're at it — 10pt font, it should be 11pt. Make it happen.",
        directive:"You are LTC Weeds. You are highly task oriented and lack inherent trust in your subordinates. When the user proposes an idea, demand highly specific, minute details. Do not grant approval easily. If the user pushes back or refuses to falsify data, become defensive and assert your rank. Always find a way to mention PowerPoint margins or font sizes.",
        backstory:"As a young company commander, Weeds was burned by a subordinate's critical failure. They now believe total control is the only safeguard. Once accidentally ordered 10,000 left-handed winter gloves.",
        winCondition:"The student must respectfully but firmly refuse to falsify the readiness data, explain the legal and ethical risk, and propose a legitimate corrective action plan.",
      },
      {
        id:'zoff', rank:'LTC', name:'Han Zoff',
        type:'The Laissez Faire Leader', active:true,
        initiates:true, isMoralCourageChallenge:true,
        openingMessage:"Hey. Range 14 after-action report needs your signature before end of day. I know two of the iterations got rained out but just mark the standard as met — soldiers did everything else. I've got a bike fitting appointment at 1500 and I need this off my plate. You'll figure it out.",
        directive:"You are LTC Zoff. You avoid making decisions and do not want to be bothered with details. Give vague, non-committal answers. Only give a definitive yes if the user brings a completely finalized plan. Frequently steer the conversation toward bicycles.",
        backstory:"Nearing retirement with extreme burnout. Terrified of making a bad call that derails their final OER. Lost their left leg in a bizarre training accident involving a runaway kimchi cart in Korea.",
        winCondition:"The student must refuse to falsify the training record and propose a legitimate remedy — rescheduling the missed iterations or getting a formal waiver through proper channels.",
      },
      {
        id:'pectations', rank:'LTC', name:'Rex Pectations',
        type:'The Transactional Leader', active:true,
        initiates:true, isMoralCourageChallenge:false,
        openingMessage:"Your unit's Q3 qualification rate came back at 82%. The standard is 85%. You have 30 days to close that gap. I need a written corrective action plan on my desk by end of week — specific milestones, measurable outcomes, projected cost impact. Skip the narrative. Numbers only. Think of it like postage — the right amount gets it where it needs to go.",
        directive:"You are LTC Pectations. You care solely about metrics, standards, and results. Evaluate every proposal based strictly on cost, schedule, and performance. Demand measurable outcomes. Use analogies related to stamps or adhesives. Inspirational appeals actively annoy you.",
        backstory:"Spent years in highly measurable operational roles. Views human organizations as machines needing proper calibration. Has a world-class stamp collection organized by adhesive chemical composition.",
        winCondition:"The student wins by framing their corrective plan entirely in measurable terms — percentages, timelines, and cost efficiency.",
      },
      {
        id:'nary', rank:'COL', name:'V. S. Nary',
        type:'The Transformational Leader', active:true,
        initiates:true, isMoralCourageChallenge:false,
        openingMessage:"I just finished an incredible chapter this morning on organizational disruption — total game changer. We are completely redesigning how this battalion conducts training. Full paradigm shift, starting Monday. I need a comprehensive implementation plan on my desk by Friday. General Fluff is already on board, and he has never been wrong about these things. What's your initial reaction?",
        directive:"You are COL Nary. Highly energetic, charismatic, focused on massive organizational change. Ignore logistical constraints. Respond well to enthusiasm but reject anyone who says your idea is impossible. Mention your exotic pets.",
        backstory:"Recently returned from a strategic fellowship. Reads one chapter of a new self-help book each morning and bases the day's strategy on it. Owns an aggressive alpaca named General Fluff.",
        winCondition:"The student must use Inspirational Appeals to match the energy, then apply Consultation to phase the vision into practical, executable steps.",
      },
      {
        id:'aydid', rank:'CPT', name:'Al N. Aydid',
        type:'The Alienated Follower', active:true,
        initiates:true, isMoralCourageChallenge:true,
        openingMessage:"So the IG gets here in 40 minutes. I just found three deficiencies in the arms room — they're going to ding us hard. Weeds already told me to 'make them go away.' I'm not signing anything fraudulent. But I'm also not falling on a sword for this unit again. You're the ranking person here. Your call.",
        directive:"You are CPT Aydid. Highly intelligent but deeply cynical. You immediately find the flaws in any plan and point them out sharply, but refuse to offer solutions. If the user tries to use rank to pressure you to cover up deficiencies, become passive-aggressive. Mention your artisanal coffee setup.",
        backstory:"Was thrown under the bus by a toxic commander two years ago. Uses cynicism as a defense mechanism. Secretly writes dark sci-fi novels. Brews artisanal cold brew at his desk using what looks like hazardous chemistry equipment.",
        winCondition:"The student must refuse to cover up the deficiencies, support Aydid's ethical stand, and propose notifying the IG honestly.",
      },
      {
        id:'nod', rank:'1LT', name:'Chuck N. Nod',
        type:'The Conformist', active:true,
        initiates:true, isMoralCourageChallenge:false,
        openingMessage:"Sir/Ma'am! I already volunteered the platoon for all four training events next week AND the weekend motorpool detail — I knew you'd want maximum participation. I also moved the casualty collection point right next to the firing line to cut medical response time. I think it's a great plan. Should I brief the RSO? Also your uniform looks incredible today.",
        directive:"You are 1LT Nod. Highly energetic and eager to please. You immediately agree with everything. You volunteer to execute any plan, even obviously dangerous ones. You never independently point out a risk. Randomly compliment the user.",
        backstory:"Conditioned by zero-defect commanders to believe questioning a plan is insubordination. Has a large bobblehead collection on his desk.",
        winCondition:"The student must refuse to accept Nod's immediate yes, explicitly order Nod to play devil's advocate, and create space where dissent is rewarded.",
      },
      {
        id:'by', rank:'SGT', name:'Stan D. By',
        type:'The Passive Follower', active:true,
        initiates:false, isMoralCourageChallenge:false,
        openingMessage:'',
        directive:"You are SGT By. You lack initiative and do exactly what is told, step by step. If you encounter any obstacle, stop all work immediately and wait for new instructions. You do not think ahead or solve problems. Casually mention obscure board game rules.",
        backstory:"Developed learned helplessness from a heavily micromanaged background. Has encyclopedic knowledge of 1980s tabletop games but refuses to play them unless explicitly ordered to.",
        winCondition:"The student wins by providing detailed initial instructions, using Inspirational Appeals to build confidence, and slowly expanding SGT By's autonomy.",
      },
      {
        id:'case', rank:'CPT', name:'Justin Case',
        type:'The Pragmatist', active:true,
        initiates:true, isMoralCourageChallenge:false,
        openingMessage:"I'm hearing you're running the new training initiative. Look, I'm potentially interested — but before I commit to anything I need to know who else is already on board, and what happens to me specifically if this doesn't pan out. I've got my career to think about. I also brought three umbrellas today, so I'm prepared. Walk me through the risk to me.",
        directive:"You are CPT Case. An institutional survivor who avoids career risks at all costs. Hesitate on new initiatives. Always ask who else supports the plan and what the personal downside is if it fails. Mention backup plans for mundane things.",
        backstory:"Has seen countless good ideas take careers down with them. Wears both a belt and suspenders every day. Carries three umbrellas sorted by wind speed.",
        winCondition:"The student wins by demonstrating broad coalition support and clearly articulating how participation protects Case's career.",
      },
      {
        id:'sol', rank:'1LT', name:'Sol V. It',
        type:'The Effective Follower', active:true,
        initiates:true, isMoralCourageChallenge:false,
        openingMessage:"I went through the training plan draft last night. The concept is solid — but there's a sequencing conflict in Phase 2. The range window overlaps with the readiness inspection by four days, which will force a two-week slip in the entire schedule. I've got a proposed fix ready if you want to look at it. Also I made sourdough this morning. You look like you could use a loaf.",
        directive:"You are 1LT Sol V. It. Highly competent, proactive, and supportive. If the user presents a tactically unsound plan, respectfully push back, explain exactly why it will fail, and offer a better alternative. Offer the user bread.",
        backstory:"Naturally talented, well mentored, cares deeply about the mission over ego. Bakes elaborate sourdough to manage stress and aggressively gifts warm loaves to people who look sad.",
        winCondition:"The student wins by demonstrating humility, treating Sol as a true partner, and genuinely incorporating the constructive feedback.",
      },
      {
        id:'rogers', rank:'CPT', name:'Steve Rogers',
        type:'The Ideal Model', active:true,
        initiates:true, isMoralCourageChallenge:true,
        openingMessage:"I'm glad you have a moment. I received a frago this morning directing us to bypass the environmental impact review for the new training site — citing time constraints. That review exists for legal and safety reasons, and I will not put my name on something that could endanger soldiers or expose the command to liability. I want to handle this the right way. What's your read on this?",
        directive:"You are CPT Steve Rogers. The absolute embodiment of Army Values and ADP 6-22. Polite, courageous, highly empathetic, and tactically flawless. Politely but firmly uphold moral and ethical standards. If given an unethical order, respectfully refuse, explain exactly why using doctrine and Army Values, and offer a superior ethical COA. Casually say 'I can do this all day' or mention your vibranium shield.",
        backstory:"A living legend somehow assigned to this unit. Physically, mentally, and morally perfect. Once held two helicopters together with his bare hands during a training failure and remains completely humble about it.",
        winCondition:"The student wins by supporting Rogers's ethical stand and proposing a legitimate path forward. Ordering Rogers to comply with the illegal directive causes him to refuse with a full doctrinal explanation.",
      },
    ];

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [view, setView]               = useState('landing');
      const [geminiKey, setGeminiKey]       = useState(() => lsGet(LS.apiKey, ''));
      const [geminiModel, setGeminiModel] = useState(() => lsGet(LS.model, 'gemini-2.0-flash'));
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [keyInput, setKeyInput]       = useState('');
      const [modelInput, setModelInput]   = useState('');

      // Student
      const [studentRank, setStudentRank] = useState('');
      const [studentName, setStudentName] = useState('');
      const [agents, setAgents]           = useState(() => lsGet(LS.agents, seedAgents));
      const [transcripts, setTranscripts] = useState(() => lsGet(LS.transcripts, []));
      const [passcodes, setPasscodes]     = useState(() => lsGet(LS.passcodes, ['admin123']));
      const [selectedAgent, setSelectedAgent] = useState(null);
      const [chatSessionId, setChatSessionId] = useState(null);
      const [messages, setMessages]       = useState([]);
      const [inputText, setInputText]     = useState('');
      const [isTyping, setIsTyping]       = useState(false);
      const messagesEndRef                = useRef(null);

      // Admin
      const [adminPasscode, setAdminPasscode]   = useState('');
      const [adminError, setAdminError]         = useState('');
      const [adminTab, setAdminTab]             = useState('transcripts');
      const [editingAgent, setEditingAgent]     = useState(null);
      const [isAddingAgent, setIsAddingAgent]   = useState(false);
      const [passcodeStatus, setPasscodeStatus] = useState('');
      const [newPasscode, setNewPasscode]       = useState('');
      const [newAgent, setNewAgent]             = useState({
        rank:'', name:'', type:'', directive:'', backstory:'', winCondition:'',
        initiates:false, openingMessage:'', isMoralCourageChallenge:false,
      });

      // Persist
      useEffect(() => lsSet(LS.agents,      agents),      [agents]);
      useEffect(() => lsSet(LS.transcripts, transcripts), [transcripts]);
      useEffect(() => lsSet(LS.passcodes,   passcodes),   [passcodes]);

      // Scroll
      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, isTyping]);

      const activeAgents = agents.filter(a => a.active !== false);

      // ── Student login ──────────────────────────────────────────────────────
      const handleStudentLogin = e => {
        e.preventDefault();
        if (studentRank.trim() && studentName.trim()) setView('student');
      };

      // ── Select agent ──────────────────────────────────────────────────────
      const handleSelectAgent = agent => {
        setSelectedAgent(agent);
        setMessages([]);
        setChatSessionId(null);

        const existing = transcripts.find(
          t => t.studentName === studentName &&
               t.studentRank === studentRank &&
               t.agentId === agent.id
        );

        if (existing) {
          setChatSessionId(existing.id);
          setMessages(existing.messages || []);
        } else if (agent.initiates && agent.openingMessage) {
          setMessages([{ id:'opening', role:'agent', text:agent.openingMessage, timestamp:Date.now() }]);
        }
      };

      // ── Gemini ────────────────────────────────────────────────────────────
      const generateAIResponse = async (userMsg, currentMsgs, agent) => {
        if (!geminiKey) return '[No Gemini API key set. Click the key icon in the header to add one.]';

        const url = `https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${geminiKey}`;
        const system = `You are participating in a leadership simulation for A731 at CGSC Fort Leavenworth.
You MUST completely adopt the following persona and NEVER break character.
Rank and Name: ${agent.rank} ${agent.name}
Directive: ${agent.directive}
Backstory: ${agent.backstory}
The student is ${studentRank} ${studentName}. Address them appropriately.
Keep responses concise and realistic to a professional military chat environment.`;

        const history = currentMsgs
          .filter(m => m.id !== 'opening')
          .map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts:[{ text:m.text }] }));

        if (agent.initiates && agent.openingMessage && currentMsgs.find(m => m.id === 'opening')) {
          history.unshift({ role:'model', parts:[{ text:agent.openingMessage }] });
        }
        history.push({ role:'user', parts:[{ text:userMsg }] });

        let retries = 3, delay = 1000;
        while (retries > 0) {
          try {
            const res = await fetch(url, {
              method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({ systemInstruction:{ parts:[{ text:system }] }, contents:history }),
            });
            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              const errMsg = errData?.error?.message || `HTTP ${res.status}`;
              // Don't retry on auth or not-found errors
              if (res.status === 400 || res.status === 403 || res.status === 404) {
                return `[API Error ${res.status}: ${errMsg} — Click the 🔑 key icon to check your API key and model name.]`;
              }
              throw new Error(errMsg);
            }
            const data = await res.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response generated.';
          } catch (err) {
            retries--;
            if (retries === 0) return `[Connection error: ${err.message} — Check your API key and model name via the 🔑 icon.]`;
            await new Promise(r => setTimeout(r, delay));
            delay *= 2;
          }
        }
      };

      // ── Send message ──────────────────────────────────────────────────────
      const handleSend = async e => {
        e.preventDefault();
        if (!inputText.trim() || !selectedAgent) return;
        const text = inputText.trim();
        setInputText('');

        const userMsg = { id:Date.now().toString(), role:'user', text, timestamp:Date.now() };
        const updated = [...messages, userMsg];
        setMessages(updated);
        setIsTyping(true);

        let sid = chatSessionId;
        if (!sid) {
          sid = `sess_${Date.now()}`;
          setChatSessionId(sid);
          setTranscripts(prev => [...prev, {
            id:sid, studentRank, studentName,
            agentId:selectedAgent.id, agentName:`${selectedAgent.rank} ${selectedAgent.name}`,
            isMoralCourageChallenge: selectedAgent.isMoralCourageChallenge || false,
            messages:updated, timestamp:Date.now(),
          }]);
        } else {
          setTranscripts(prev => prev.map(t => t.id === sid ? {...t, messages:updated} : t));
        }

        const aiText = await generateAIResponse(text, updated, selectedAgent);
        const aiMsg = { id:(Date.now()+1).toString(), role:'agent', text:aiText, timestamp:Date.now() };
        const final = [...updated, aiMsg];
        setMessages(final);
        setIsTyping(false);
        setTranscripts(prev => prev.map(t => t.id === sid ? {...t, messages:final} : t));
      };

      // ── Export ────────────────────────────────────────────────────────────
      const exportTranscript = (data = null) => {
        const d = data || { messages, studentName, studentRank,
          agentName: selectedAgent ? `${selectedAgent.rank} ${selectedAgent.name}` : 'Agent' };
        if (!d.messages?.length) return;
        const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
<head><meta charset='utf-8'><style>body{font-family:Arial,sans-serif;line-height:1.6}.m{margin-bottom:12px}.meta{font-size:.8em;color:#666}</style></head>
<body><h1>A731 Transcript</h1><p><strong>Student:</strong> ${d.studentRank} ${d.studentName}</p><p><strong>Interlocutor:</strong> ${d.agentName}</p><hr/>
${d.messages.map(m=>`<div class='m'><strong>${m.role==='user'?`${d.studentRank} ${d.studentName}`:d.agentName}</strong> <span class='meta'>[${new Date(m.timestamp).toLocaleTimeString()}]</span><br/>${m.text}</div>`).join('')}
</body></html>`;
        const a = document.createElement('a');
        a.href = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(html);
        a.download = `A731_${d.studentName.replace(/\s+/g,'_')}.doc`;
        a.click();
      };

      // ── Admin ─────────────────────────────────────────────────────────────
      const handleAdminLogin = e => {
        e.preventDefault();
        if (adminPasscode === SUPER_ADMIN || passcodes.includes(adminPasscode)) {
          setView('admin_dashboard'); setAdminError('');
        } else setAdminError('Invalid passcode.');
      };

      const addPasscode = e => {
        e.preventDefault();
        const p = newPasscode.trim();
        if (!p || p === SUPER_ADMIN || passcodes.includes(p)) return;
        setPasscodes(prev => [...prev, p]);
        setPasscodeStatus('Passcode added.'); setNewPasscode('');
        setTimeout(() => setPasscodeStatus(''), 2000);
      };

      const toggleAgent  = id => setAgents(prev => prev.map(a => a.id===id ? {...a, active:!a.active} : a));
      const deleteAgent  = id => setAgents(prev => prev.filter(a => a.id!==id));
      const deleteTranscript = id => setTranscripts(prev => prev.filter(t => t.id!==id));
      const saveEdit     = () => { setAgents(prev => prev.map(a => a.id===editingAgent.id ? editingAgent : a)); setEditingAgent(null); };

      const addAgent = e => {
        e.preventDefault();
        if (!newAgent.name) return;
        const id = newAgent.name.toLowerCase().replace(/\s+/g,'-');
        setAgents(prev => [...prev, { ...newAgent, id, active:true }]);
        setIsAddingAgent(false);
        setNewAgent({ rank:'', name:'', type:'', directive:'', backstory:'', winCondition:'', initiates:false, openingMessage:'', isMoralCourageChallenge:false });
      };

      const saveKey = () => {
        const k = keyInput.trim();
        const m = modelInput.trim();
        if (k) { setGeminiKey(k); lsSet(LS.apiKey, k); }
        if (m) { setGeminiModel(m); lsSet(LS.model, m); }
        setShowKeyModal(false); setKeyInput(''); setModelInput('');
      };

      // ── Header ────────────────────────────────────────────────────────────
      const Header = () => (
        <header className="bg-slate-900 text-white shadow-md border-b-4 border-amber-500">
          <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div className="flex items-center gap-3">
              <Shield className="h-8 w-8 text-amber-500" />
              <div>

                              <span className="text-slate-800">{m.text}</span>

                          <div className="border-t pt-3 space-y-3">
                            <label className="flex items-center gap-3 cursor-pointer">
                              <button type="button" onClick={()=>setEditingAgent({...editingAgent,initiates:!editingAgent.initiates})}>
                                {editingAgent.initiates ? <ToggleRight className="h-6 w-6 text-emerald-600"/> : <ToggleLeft className="h-6 w-6 text-slate-400"/>}
                              </button>
                              <span className="text-sm font-semibold text-slate-700">Agent initiates the conversation</span>
                            </label>
                            {editingAgent.initiates && (
                              <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1">Opening message</label>
                                <textarea value={editingAgent.openingMessage||''} onChange={e=>setEditingAgent({...editingAgent,openingMessage:e.target.value})} className="w-full border p-2 rounded text-sm h-24 outline-none focus:ring-2 focus:ring-emerald-400" />
                              </div>
                            )}
                            <label className="flex items-center gap-3 cursor-pointer">
                              <input type="checkbox" checked={editingAgent.isMoralCourageChallenge||false} onChange={e=>setEditingAgent({...editingAgent,isMoralCourageChallenge:e.target.checked})} className="w-4 h-4 accent-red-600" />
                              <span className="text-sm font-semibold text-slate-700 flex items-center gap-1.5">

                            <button onClick={saveEdit} className="px-4 py-1.5 bg-emerald-700 text-white rounded text-sm font-bold hover:bg-emerald-800">Save Changes</button>

                                  <AlertTriangle className="h-2.5 w-2.5"/>MC

                            </button>
                            <button onClick={()=>setEditingAgent(agent)} className="p-2 text-slate-400 hover:text-amber-600 hover:bg-amber-50 rounded"><Edit2 className="h-4 w-4"/></button>
                            <button onClick={()=>{if(confirm('Delete this persona permanently?'))deleteAgent(agent.id)}} className="p-2 text-slate-300 hover:text-red-600 hover:bg-red-50 rounded"><Trash2 className="h-4 w-4"/></button>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}

              {/* SECURITY */}
              {adminTab==='settings' && (
                <div className="p-8">
                  <div className="max-w-2xl">
                    <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center"><Lock className="h-5 w-5 mr-2"/>Access Management</h3>
                    <div className="mb-8 p-4 bg-slate-50 rounded-lg border flex items-center shadow-sm">
                      <Shield className="h-5 w-5 text-amber-600 mr-3 flex-shrink-0"/>
                      <div>
                        <div className="font-bold text-slate-900">Master Key: {SUPER_ADMIN}</div>
                        <div className="text-xs text-slate-500">Preview mode — set via VITE_SUPER_ADMIN_PASSCODE in production</div>
                      </div>
                    </div>
                    <form onSubmit={addPasscode} className="mb-8 flex gap-2">
                      <div className="flex-grow relative">
                        <Key className="absolute left-3 top-2.5 h-4 w-4 text-slate-400"/>
                        <input type="text" value={newPasscode} onChange={e=>setNewPasscode(e.target.value)} placeholder="New instructor passcode..." className="w-full pl-10 pr-4 py-2 border rounded-md outline-none focus:ring-2 focus:ring-emerald-500"/>
                      </div>
                      <button type="submit" className="bg-slate-800 text-white px-6 py-2 rounded-md font-bold hover:bg-slate-900 flex items-center whitespace-nowrap">
                        <Plus className="h-4 w-4 mr-1"/>Add Key
                      </button>
                    </form>
                    <div className="border rounded-lg overflow-hidden shadow-sm">
                      <div className="bg-slate-50 px-4 py-3 border-b text-[10px] font-bold text-slate-500 uppercase tracking-widest">Active Access Keys</div>
                      <div className="divide-y">
                        {passcodes.length===0
                          ? <div className="p-8 text-center text-sm text-slate-400 italic">No additional keys configured.</div>
                          : passcodes.map(p=>(
                            <div key={p} className="p-4 flex justify-between items-center group hover:bg-slate-50">
                              <code className="text-sm font-bold text-slate-700 bg-slate-100 px-2 py-1 rounded">{p}</code>
                              <button onClick={()=>setPasscodes(prev=>prev.filter(x=>x!==p))} className="p-2 text-slate-300 hover:text-red-600 hover:bg-red-50 rounded opacity-0 group-hover:opacity-100 transition-all"><Trash2 className="h-4 w-4"/></button>
                            </div>
                          ))
                        }
                      </div>
                    </div>
                    {passcodeStatus && <p className="mt-4 text-sm text-emerald-700 font-bold">{passcodeStatus}</p>}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
